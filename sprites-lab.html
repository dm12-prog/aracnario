<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Aracnário — Sprite Lab</title>
<!-- load the SHARED renderer, cache-busted so edits always show (bypasses the SW cache) -->
<script>document.write('<script src="src/sprites.js?bust=' + Date.now() + '"><\/script>');</script>
<style>
  :root{ --sil:#243741; --bg:#0e1519; --tile:#16232a; --edge:#2a3b44; --amber:#f4b740; --ink:#cfe3ee; }
  *{ box-sizing:border-box; }
  body{ margin:0; font:14px/1.4 system-ui,sans-serif; background:var(--bg); color:var(--ink); }
  header{ display:flex; align-items:center; gap:16px; flex-wrap:wrap; padding:12px 16px; border-bottom:1px solid var(--edge); position:sticky; top:0; background:var(--bg); z-index:5; }
  header h1{ font-size:16px; margin:0; color:var(--amber); letter-spacing:.5px; }
  header label{ display:flex; align-items:center; gap:6px; font-size:13px; }
  .wrap{ display:flex; gap:16px; align-items:flex-start; padding:16px; }
  .panel{ flex:0 0 300px; position:sticky; top:60px; background:var(--tile); border:1px solid var(--edge); border-radius:10px; padding:14px; }
  .panel h2{ font-size:12px; text-transform:uppercase; letter-spacing:1px; color:#8aa; margin:0 0 8px; }
  .row{ display:grid; grid-template-columns:64px 1fr 38px; align-items:center; gap:8px; margin:5px 0; }
  .row span{ font-size:12px; color:#9bb; }
  .row output{ font:12px ui-monospace,monospace; color:var(--amber); text-align:right; }
  input[type=range]{ width:100%; }
  select,button{ background:#10202a; color:var(--ink); border:1px solid var(--edge); border-radius:7px; padding:6px 9px; font:inherit; }
  button{ cursor:pointer; }
  button.primary{ background:var(--amber); color:#1a1208; border-color:var(--amber); font-weight:700; }
  .gallery{ flex:1; }
  .grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:10px; }
  .cell{ background:var(--tile); border:1px solid var(--edge); border-radius:12px; padding:8px; text-align:center; }
  .cell .sq{ width:100%; aspect-ratio:1/1; display:grid; place-items:center; }
  .cell svg{ width:90%; height:90%; image-rendering:pixelated; }
  .cell b{ display:block; font-size:11px; margin-top:4px; color:#bcd; }
  .cell small{ color:#7a8b94; font-size:10px; }
  .focusbar{ display:flex; gap:14px; align-items:center; margin-bottom:14px; flex-wrap:wrap; }
  .focusbar .sq{ width:200px; height:200px; background:var(--tile); border:1px solid var(--edge); border-radius:14px; display:grid; place-items:center; }
  .focusbar .sq svg{ width:92%; height:92%; image-rendering:pixelated; }
  textarea{ width:100%; height:130px; background:#0b141a; color:#9fd; border:1px solid var(--edge); border-radius:7px; font:11px ui-monospace,monospace; padding:8px; margin-top:8px; display:none; }
  .hint{ font-size:12px; color:#7a8b94; margin:4px 0 10px; }
</style>
</head>
<body>
<header>
  <h1>🕷 Aracnário · Sprite Lab</h1>
  <label>Family <select id="styleSel"></select></label>
  <label><input type="checkbox" id="silToggle"> silhouettes</label>
  <label>size <input type="range" id="sizeSel" min="90" max="320" value="170" style="width:120px"></label>
  <button id="resetBtn">Reset</button>
  <button class="primary" id="copyBtn">Copy config ⇩</button>
</header>

<div class="wrap">
  <aside class="panel">
    <h2>Leg style · <span id="stName"></span></h2>
    <div id="cfgRows"></div>
    <h2 style="margin-top:14px">Abdomen · <span id="abName"></span></h2>
    <div id="abRows"></div>
    <p class="hint">Sliders edit the live tables and re-render everything. “Copy config” dumps the
      current <code>CFG/AB/FAN</code> as JS to paste into <code>src/sprites.js</code>.</p>
    <textarea id="dump" readonly></textarea>
  </aside>

  <main class="gallery">
    <div class="focusbar">
      <div class="sq" id="focusColor"></div>
      <div class="sq" id="focusSil"></div>
      <div>
        <div id="focusLabel" style="font-size:15px;color:var(--amber)"></div>
        <div class="hint" id="focusMeta"></div>
      </div>
    </div>
    <h2 style="font-size:12px;letter-spacing:1px;color:#8aa;text-transform:uppercase">All families</h2>
    <div class="grid" id="grid"></div>
  </main>
</div>

<script>
window.addEventListener('DOMContentLoaded', function(){
  var S = window.AracnarioSprites;
  if(!S){ document.body.innerHTML = '<p style="padding:20px;color:#f88">Could not load src/sprites.js</p>'; return; }
  var shade = S.shade;
  // working copies of the tuning tables (mutated by sliders)
  var CFG = S.clone(S.defaults.CFG), AB = S.clone(S.defaults.AB), FAN = S.clone(S.defaults.FAN);

  // representative art per leg-style so the gallery shows real family variety
  var REP = {
    orb:     {abd:'bulb',  marking:'cross',   eyes:8,    body:'#9a5a36', fam:'Araneidae (cross)'},
    wolf:    {abd:'oval',  marking:'bands',   eyes:8,    body:'#6b513a', fam:'Lycosidae (wolf)'},
    jumper:  {abd:'egg',   marking:'none',    eyes:'big',body:'#7d8a4a', fam:'Salticidae (jumper)'},
    ground:  {abd:'elong', marking:'none',    eyes:8,    body:'#4a4540', fam:'Gnaphosidae (ground)'},
    crab:    {abd:'flat',  marking:'none',    eyes:8,    body:'#cfd8b0', fam:'Thomisidae (crab)'},
    huntsman:{abd:'flat',  marking:'none',    eyes:8,    body:'#8a7a5e', fam:'Sparassidae (huntsman)'},
    funnel:  {abd:'oval',  marking:'bands',   eyes:8,    body:'#7a6a52', fam:'Agelenidae (funnel)'},
    tube:    {abd:'elong', marking:'none',    eyes:6,    body:'#5a4a52', fam:'Segestriidae (tube)'},
    recluse: {abd:'oval',  marking:'violin',  eyes:6,    body:'#9c6b4a', fam:'Sicariidae (recluse)'},
    long:    {abd:'elong', marking:'none',    eyes:8,    body:'#b9b2a8', fam:'Pholcidae (long)'},
    compact: {abd:'globe', marking:'spots13', eyes:8,    body:'#2a2530', fam:'Theridiidae (compact)'},
    micro:   {abd:'round', marking:'none',    eyes:8,    body:'#7a6a4a', fam:'Linyphiidae (micro)'},
  };
  function artFor(style){ var r=REP[style]; return {style:style, abd:r.abd, marking:r.marking, eyes:r.eyes, body:r.body, leg:shade(r.body,-14), accent:shade(r.body,-34)}; }
  var opts = function(){ return {cfg:CFG, ab:AB, fan:FAN}; };

  var styleSel=document.getElementById('styleSel'), silToggle=document.getElementById('silToggle'),
      sizeSel=document.getElementById('sizeSel'), grid=document.getElementById('grid'),
      cfgRows=document.getElementById('cfgRows'), abRows=document.getElementById('abRows'),
      dump=document.getElementById('dump');
  S.STYLES.forEach(function(st){ var o=document.createElement('option'); o.value=st; o.textContent=st; styleSel.appendChild(o); });

  // slider definitions: which CFG fields to expose
  var CFGFIELDS=[['legW','leg width',1,6,1],['W','reach (half-width)',8,40,1],['rise','knee rise',0,30,1],['drop','foot drop',2,28,1],['cR0','head width',5,16,1],['cR1','head height',5,16,1]];
  var ABFIELDS=[['dy','offset up',-26,-6,1],['rx','width',5,20,1],['ry','height',6,22,1]];

  function slider(host, label, val, min, max, step, oninput){
    var row=document.createElement('div'); row.className='row';
    var s=document.createElement('span'); s.textContent=label;
    var i=document.createElement('input'); i.type='range'; i.min=min; i.max=max; i.step=step; i.value=val;
    var o=document.createElement('output'); o.textContent=val;
    i.addEventListener('input', function(){ o.textContent=i.value; oninput(parseFloat(i.value)); });
    row.appendChild(s); row.appendChild(i); row.appendChild(o); host.appendChild(row);
  }

  function buildPanel(){
    var st=styleSel.value, cfg=CFG[st];
    document.getElementById('stName').textContent=st+' ('+cfg.cat+')';
    cfgRows.innerHTML='';
    CFGFIELDS.forEach(function(f){
      var key=f[0], get=function(){ return key==='cR0'?cfg.cR[0]:key==='cR1'?cfg.cR[1]:cfg[key]; };
      slider(cfgRows, f[1], get(), f[2], f[3], f[4], function(v){
        if(key==='cR0') cfg.cR[0]=v; else if(key==='cR1') cfg.cR[1]=v; else cfg[key]=v;
        renderAll();
      });
    });
    var abKey=REP[st].abd, ab=AB[abKey];
    document.getElementById('abName').textContent=abKey;
    abRows.innerHTML='';
    ABFIELDS.forEach(function(f,idx){
      slider(abRows, f[1], ab[idx], f[2], f[3], f[4], function(v){ ab[idx]=v; renderAll(); });
    });
  }

  function renderFocus(){
    var st=styleSel.value, art=artFor(st);
    document.getElementById('focusColor').innerHTML=S.spiderMon(art,'full',opts());
    document.getElementById('focusSil').innerHTML=S.spiderMon(art,'silhouette',opts());
    document.getElementById('focusLabel').textContent=REP[st].fam;
    var cfg=CFG[st];
    document.getElementById('focusMeta').textContent='cR['+cfg.cR.join(',')+'] · legW '+cfg.legW+' · W '+cfg.W+' · rise '+cfg.rise+' · drop '+cfg.drop+' · '+cfg.cat;
  }

  function renderAll(){
    renderFocus();
    var sil=silToggle.checked, size=sizeSel.value;
    grid.style.setProperty('--n','');
    grid.innerHTML='';
    S.STYLES.forEach(function(st){
      var art=artFor(st);
      var cell=document.createElement('div'); cell.className='cell';
      cell.innerHTML='<div class="sq">'+S.spiderMon(art, sil?'silhouette':'full', opts())+'</div><b>'+st+'</b><small>'+REP[st].fam.replace(/\s*\(.*\)/,'')+'</small>';
      cell.querySelector('.sq').style.minHeight=(size*0.7)+'px';
      cell.style.cursor='pointer';
      cell.addEventListener('click', function(){ styleSel.value=st; buildPanel(); renderAll(); window.scrollTo({top:0,behavior:'smooth'}); });
      grid.appendChild(cell);
    });
    grid.style.gridTemplateColumns='repeat(auto-fill,minmax('+size+'px,1fr))';
  }

  document.getElementById('copyBtn').addEventListener('click', function(){
    var js='const MON_AB = '+JSON.stringify(AB)+';\n\nconst MON_FAN = '+JSON.stringify(FAN)+';\n\nconst MON_CFG = '+JSON.stringify(CFG)+';';
    dump.style.display='block'; dump.value=js; dump.select();
    try{ navigator.clipboard.writeText(js); }catch(e){}
  });
  document.getElementById('resetBtn').addEventListener('click', function(){
    CFG=S.clone(S.defaults.CFG); AB=S.clone(S.defaults.AB); FAN=S.clone(S.defaults.FAN);
    buildPanel(); renderAll(); dump.style.display='none';
  });
  styleSel.addEventListener('change', function(){ buildPanel(); renderAll(); });
  silToggle.addEventListener('change', renderAll);
  sizeSel.addEventListener('input', renderAll);

  styleSel.value='orb'; buildPanel(); renderAll();
});
</script>
</body>
</html>
