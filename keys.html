<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<!-- PWA: installable + field offline. Own manifest so it launches on the keys page. -->
<link rel="manifest" href="manifest-keys.json">
<meta name="theme-color" content="#e8dfc8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ID Keys">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap">
<title>Aracnário — Spider ID Keys (PT, all 57 families)</title>
<style>
  :root{
    /* Light kraft-paper field-guide palette */
    --ink:#e8dfc8;            /* page paper (was darkest bg) */
    --ink2:#ded3b8;           /* recessed paper (inputs, cards-on-cards) */
    --tile:#f1e9d6;           /* raised card paper */
    --tile-edge:#cdbf9d;      /* card hairline */
    --paper:#f5efe0;
    --text:#2f2a20;           /* dark sepia-brown ink */
    --muted:#6d6450;          /* faded ink */
    --muted2:#8c8369;         /* lightest legible ink */
    --line:#cdbf9d;           /* soft brown hairline */
    --azulejo:#5d7345;        /* moss green (links/active accent) */
    --azulejo-deep:#3f5430;   /* deep moss (active selection bg) */
    --amber:#b9762a;          /* ochre/terracotta accent */
    --amber-soft:#8a6a3a;     /* muted sepia-gold */
    --sil:#e6dcc2;            /* manila panel */
    --good:#5d7345;           /* moss */
    --warn:#b9762a;           /* ochre */
    --danger:#a85236;         /* terracotta */
    --display:"Avenir Next","Segoe UI",system-ui,-apple-system,"Helvetica Neue",Arial,sans-serif;
    --mono:ui-monospace,"SF Mono","Cascadia Mono","Roboto Mono",Menlo,Consolas,monospace;
    --shadow:0 4px 16px rgba(74,58,32,.16);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:
      radial-gradient(900px 520px at 85% -8%, rgba(93,115,69,.10), transparent 60%),
      radial-gradient(720px 440px at -5% 4%, rgba(185,118,42,.10), transparent 55%),
      var(--ink);
    color:var(--text); font-family:var(--display);
    -webkit-font-smoothing:antialiased; line-height:1.5;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .wrap{max-width:1080px;margin:0 auto;padding:22px 16px 64px}
  a{color:var(--azulejo)}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted)}
  header.top{display:flex;flex-wrap:wrap;gap:18px;align-items:flex-end;justify-content:space-between;
    border-bottom:1px solid var(--line);padding-bottom:18px;margin-bottom:18px}
  h1{font-size:clamp(24px,5vw,38px);line-height:1;margin:.18em 0 .12em;letter-spacing:-.01em;font-weight:800}
  h1 .web{color:var(--amber)}
  p.sub{margin:0;color:var(--muted);max-width:60ch;font-size:14px}
  nav.tabs{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
  nav.tabs button{font-family:var(--display);font-weight:700;font-size:13px;color:var(--muted);
    background:var(--tile);border:1px solid var(--tile-edge);border-radius:999px;padding:8px 16px;cursor:pointer}
  nav.tabs button.active{color:#fff;background:var(--amber);border-color:var(--amber)}

  .grid{display:grid;grid-template-columns:280px 1fr;gap:18px}
  @media (max-width:760px){.grid{grid-template-columns:1fr}}
  .panel{background:var(--tile);border:1px solid var(--tile-edge);border-radius:14px;padding:16px;box-shadow:var(--shadow)}
  .search{width:100%;background:var(--ink2);border:1px solid var(--line);border-radius:10px;color:var(--text);
    padding:9px 12px;font-family:var(--display);font-size:14px;margin-bottom:10px}
  .fam-list{max-height:70vh;overflow-y:auto;display:flex;flex-direction:column;gap:4px}
  .fam-item{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;
    cursor:pointer;font-size:13px;color:var(--muted)}
  .fam-item:hover{background:var(--ink2)}
  .fam-item.active{background:var(--azulejo-deep);color:#fff}
  .fam-item .found-dot{width:7px;height:7px;border-radius:50%;background:var(--amber);flex:0 0 auto}
  .fam-item .n{font-family:var(--mono);font-size:10px;color:var(--muted2)}

  .depth-pill{font-family:var(--mono);font-size:10px;letter-spacing:.04em;text-transform:uppercase;
    border-radius:999px;padding:2px 8px;display:inline-block}
  .depth-species{background:rgba(92,191,135,.18);color:var(--good)}
  .depth-genus{background:rgba(72,146,194,.18);color:var(--azulejo)}
  .depth-family-only{background:rgba(229,113,99,.18);color:var(--danger)}

  .fam-detail h2{margin:0 0 2px;font-size:24px}
  .fam-detail .common{color:var(--amber-soft);font-size:14px;margin:0 0 14px}
  .char-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0}
  @media (max-width:600px){.char-grid{grid-template-columns:1fr}}
  .char-card{background:var(--ink2);border:1px solid var(--line);border-radius:10px;padding:10px 12px}
  .char-card b{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted2);margin-bottom:4px}
  .char-card span{font-size:13px;color:var(--text)}

  .fq{background:var(--ink2);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:8px}
  .fq .ask{font-weight:700;font-size:13px}
  .fq .yes{color:var(--muted);font-size:12px;margin-top:3px}

  .lookalike{font-size:13px;color:var(--muted);margin-bottom:6px}
  .lookalike b{color:var(--text)}

  .deeper{background:var(--sil);border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin:10px 0}
  .deeper .lvl{font-family:var(--mono);font-size:11px;text-transform:uppercase;color:var(--amber);margin-bottom:6px}
  .deeper .src{font-size:12px;color:var(--muted);margin-top:8px}
  .deeper .src a{word-break:break-all}

  .photo-box{display:flex;flex-direction:column;gap:8px;align-items:flex-start;margin-bottom:16px}
  .photo-box img{width:min(420px,100%);height:auto;object-fit:contain;border-radius:12px;
    border:1px solid var(--line);box-shadow:var(--shadow);background:var(--ink2)}
  .photo-meta{font-size:11px;color:var(--muted2);max-width:42ch}

  /* small visual cue in the routing key */
  .opt-thumb{width:72px;height:72px;object-fit:cover;border-radius:8px;border:1px solid var(--line);
    margin-top:8px;display:block;background:var(--ink2)}

  .sources{font-size:11px;color:var(--muted2);margin-top:14px}
  .sources a{color:var(--muted)}

  .btn{font-family:var(--display);font-weight:700;font-size:13px;color:#fff;
    background:var(--amber);border:none;border-radius:999px;padding:9px 16px;cursor:pointer;text-decoration:none;display:inline-block}

  /* Family routing (step-through key) */
  .step-card{background:var(--ink2);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:14px}
  .step-num{font-family:var(--mono);color:var(--muted2);font-size:12px;margin-bottom:8px}
  .opt-btn{display:block;width:100%;text-align:left;background:var(--tile);border:1px solid var(--tile-edge);
    border-radius:10px;padding:12px 14px;margin-bottom:8px;color:var(--text);font-family:var(--display);
    font-size:13px;cursor:pointer}
  .opt-btn:hover{border-color:var(--azulejo)}
  .opt-btn .target{display:block;margin-top:4px;font-family:var(--mono);font-size:11px;color:var(--amber-soft)}
  .breadcrumb{font-family:var(--mono);font-size:11px;color:var(--muted2);margin-bottom:10px}
  .breadcrumb span{cursor:pointer;text-decoration:underline}
  .honesty{font-size:11px;color:var(--muted2);background:var(--ink2);border:1px solid var(--line);
    border-radius:10px;padding:10px 12px;margin-bottom:14px}

  .empty{color:var(--muted2);font-size:13px;padding:40px 0;text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div>
      <p class="eyebrow">Aracnário · Full Coverage</p>
      <h1>Spider <span class="web">ID Keys</span></h1>
      <p class="sub">All 57 Portuguese spider families — plain-language characters, field questions, and the deepest available identification key for each. Citation-backed, honest about depth limits.</p>
    </div>
  </header>

  <nav class="tabs">
    <button id="tab-browse" class="active">Browse families</button>
    <button id="tab-routing">Family routing key</button>
  </nav>

  <div id="view-browse" class="grid">
    <div class="panel">
      <input class="search" id="search" placeholder="Search family or character…">
      <div class="fam-list" id="fam-list"></div>
    </div>
    <div class="panel fam-detail" id="fam-detail">
      <div class="empty">Pick a family from the list.</div>
    </div>
  </div>

  <div id="view-routing" class="panel" style="display:none">
    <div class="honesty" id="routing-honesty"></div>
    <div class="breadcrumb" id="routing-breadcrumb"></div>
    <div id="routing-step"></div>
  </div>
</div>

<script>
let KEYS = null, ENRICH = null;
let activeFamily = null;
let routingPath = []; // history of step numbers for back-nav

async function boot(){
  try {
    const [keysRes, enrichRes] = await Promise.all([
      fetch('data/keys.json'), fetch('data/species_enrichment.json')
    ]);
    KEYS = await keysRes.json();
    ENRICH = await enrichRes.json();
  } catch (e) {
    document.getElementById('fam-list').innerHTML =
      '<div class="empty">Could not load data/keys.json.<br>Serve this folder over HTTP (e.g. <code>python3 -m http.server</code>) — browsers block fetch() of local files opened via file://.</div>';
    return;
  }
  renderFamList();
  renderRoutingHonesty();
  renderRoutingStep(1, []);
  wireTabs();
  wireSearch();
}

// Strip dangling references to figures we don't have (the Spiders of Europe
// line drawings were never captured). Removes figure-pointer language only,
// leaving the diagnostic prose intact and tidy.
function cleanFigRefs(str){
  if (!str) return str;
  let s = String(str);
  // optional figure number(s): "12", "3-4", "3, 4a"
  const NUM = '(?:\\s*\\d+[a-z]?(?:\\s*[-–—,]\\s*\\d+[a-z]?)*)?';
  // 1) parenthetical refs: "(fig. 3-4)", "(figs 3,4)"
  s = s.replace(/\s*\(\s*figs?\.?[^)]*\)/gi, '');
  // 2) "see / cf. / compare fig(s) N"
  s = s.replace(new RegExp('[;,]?\\s*(?:see|cf\\.?|compare)\\s+figs?\\.?' + NUM, 'gi'), '');
  // 3) "as in fig.", "as fig. 5" — keep the preceding word (e.g. "habitus")
  s = s.replace(new RegExp('\\s*as\\s+(?:in\\s+)?figs?\\.?' + NUM + '(?=$|[\\s.;,])', 'gi'), '');
  // 4) standalone "fig. 12" / trailing bare "fig."
  s = s.replace(new RegExp('[;,]?\\s*figs?\\.?' + NUM + '(?=$|[\\s.;,])', 'gi'), '');
  // tidy leftover whitespace / dangling punctuation
  s = s.replace(/\s+/g, ' ').replace(/\s*([;,.])/g, '$1').replace(/[\s;,]+$/, '').trim();
  return s;
}

// Prefer iNat's large (1024px) variant over medium (500px) for display.
function biggerPhoto(url){
  return url ? url.replace(/\/(square|small|medium)\.(jpg|jpeg|png)/i, '/large.$2') : url;
}

function depthPillHtml(level){
  const cls = level === 'species' ? 'depth-species' : level === 'genus' ? 'depth-genus' : 'depth-family-only';
  return `<span class="depth-pill ${cls}">${level}</span>`;
}

function renderFamList(filter){
  const list = document.getElementById('fam-list');
  const q = (filter||'').toLowerCase();
  const names = Object.keys(KEYS.families).sort();
  list.innerHTML = names.filter(name => {
    if (!q) return true;
    const rec = KEYS.families[name];
    return name.toLowerCase().includes(q) ||
      rec.common_group.toLowerCase().includes(q) ||
      JSON.stringify(rec.characters).toLowerCase().includes(q);
  }).map(name => {
    const rec = KEYS.families[name];
    const found = !!rec.found_check;
    return `<div class="fam-item${name===activeFamily?' active':''}" data-fam="${name}">
      <span>${found?'<span class="found-dot" title="You have found a species in this family"></span> ':''}${name}</span>
      <span class="n">${rec.deeper_key.level[0].toUpperCase()}</span>
    </div>`;
  }).join('') || '<div class="empty">No matches.</div>';
  list.querySelectorAll('.fam-item').forEach(el => {
    el.addEventListener('click', () => { activeFamily = el.dataset.fam; renderFamList(document.getElementById('search').value); renderFamDetail(); });
  });
}

function representativePhoto(family){
  const candidates = Object.values(ENRICH.by_inat || {}).filter(s => s.family === family && s.photo);
  if (!candidates.length) return null;
  return candidates[0].photo;
}

function renderFamDetail(){
  const detail = document.getElementById('fam-detail');
  if (!activeFamily) { detail.innerHTML = '<div class="empty">Pick a family from the list.</div>'; return; }
  const rec = KEYS.families[activeFamily];
  const photo = representativePhoto(activeFamily);
  const dk = rec.deeper_key;

  detail.innerHTML = `
    <h2>${activeFamily}</h2>
    <p class="common">${rec.common_group} · typically ${rec.size_mm_typical} mm</p>
    ${photo ? `<div class="photo-box">
      <img src="${biggerPhoto(photo.url)}" alt="${activeFamily} representative photo"
        onerror="this.onerror=null;this.src='${photo.url}'">
      <div class="photo-meta">${photo.attr || ''}</div>
    </div>` : ''}
    ${rec.found_check ? `<div class="honesty">✓ ${rec.found_check}</div>` : ''}
    <div class="char-grid">
      ${Object.entries(rec.characters).map(([k,v]) => `<div class="char-card"><b>${k.replace('_',' ')}</b><span>${v}</span></div>`).join('')}
    </div>
    <h3>Field questions</h3>
    ${rec.field_questions.map(q => `<div class="fq"><div class="ask">${q.ask}</div><div class="yes">Yes → ${q.yes_means}</div></div>`).join('')}
    <h3>Lookalikes</h3>
    ${rec.lookalikes.map(l => `<div class="lookalike"><b>${l.family}:</b> ${l.how_to_tell_apart}</div>`).join('') || '<div class="lookalike">None noted.</div>'}
    <h3>Deepest available key</h3>
    <div class="deeper">
      <div class="lvl">${depthPillHtml(dk.level)} ${dk.available ? '' : '— no key below this level'}</div>
      ${cleanFigRefs(dk.notes)}
      <div class="src">Source: <a href="${dk.source.url}" target="_blank">${dk.source.title}</a> (${dk.source.authors}, accessed ${dk.source.accessed})</div>
    </div>
    <a class="btn" href="aracnario.html" target="_blank">Identified a species? Add it to Aracnário →</a>
    <div class="sources">Sources consulted: ${rec.sources_consulted.map(u => `<a href="${u}" target="_blank">${u}</a>`).join(' · ')}</div>
  `;
}

function renderRoutingHonesty(){
  const r = KEYS.family_routing;
  document.getElementById('routing-honesty').textContent =
    `Source: ${r.source.title} (${r.source.authors}, ${r.source.url}, accessed ${r.source.accessed}). ` +
    `Not separately routed (newer taxonomic splits — see those families' own records): ${r.not_separately_routed.join(', ')}.`;
}

function renderRoutingStep(stepNum, path){
  routingPath = path;
  const couplet = KEYS.family_routing.couplets.find(c => c.step === stepNum);
  const breadcrumb = document.getElementById('routing-breadcrumb');
  // chain = every step visited so far, ending at the current one
  const chain = [...path, stepNum];
  breadcrumb.innerHTML = chain.map((s,i) => `<span data-i="${i}">Step ${s}</span>`).join(' → ');
  breadcrumb.querySelectorAll('span').forEach(el => {
    el.addEventListener('click', () => {
      const i = +el.dataset.i;
      renderRoutingStep(chain[i], chain.slice(0, i));
    });
  });

  const container = document.getElementById('routing-step');
  if (!couplet) { container.innerHTML = '<div class="empty">Step not found.</div>'; return; }
  container.innerHTML = `<div class="step-card">
    <div class="step-num">COUPLET ${couplet.step}</div>
    ${couplet.options.map(o => {
      const isFamily = !String(o.leads_to).startsWith('step');
      const targetLabel = isFamily ? `→ ${o.leads_to}` : `→ continue to ${o.leads_to}`;
      const photo = isFamily && KEYS.families[o.leads_to] ? representativePhoto(o.leads_to) : null;
      const thumb = photo ? `<img class="opt-thumb" src="${biggerPhoto(photo.url)}"
        alt="${o.leads_to}" onerror="this.onerror=null;this.src='${photo.url}'">` : '';
      return `<button class="opt-btn" data-leads="${o.leads_to}" data-family="${isFamily}">
        ${cleanFigRefs(o.text)}<span class="target">${targetLabel}</span>${thumb}
      </button>`;
    }).join('')}
  </div>`;
  container.querySelectorAll('.opt-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const leads = btn.dataset.leads;
      if (btn.dataset.family === 'true') {
        if (!KEYS.families[leads]) {
          // terminal family from the general European key that isn't one of PT's 57
          // (this key isn't PT-scoped at every leaf) — say so instead of crashing.
          container.insertAdjacentHTML('beforeend',
            `<div class="honesty">${leads} is not one of the 57 Portuguese families covered here — this branch of the European key leads outside PT's documented fauna.</div>`);
          return;
        }
        activeFamily = leads;
        document.getElementById('tab-browse').click();
        renderFamList(); renderFamDetail();
      } else {
        const next = +leads.replace('step ', '');
        renderRoutingStep(next, [...routingPath, stepNum]);
      }
    });
  });
}

function wireTabs(){
  const tb = document.getElementById('tab-browse'), tr = document.getElementById('tab-routing');
  const vb = document.getElementById('view-browse'), vr = document.getElementById('view-routing');
  tb.addEventListener('click', () => { tb.classList.add('active'); tr.classList.remove('active'); vb.style.display='grid'; vr.style.display='none'; });
  tr.addEventListener('click', () => { tr.classList.add('active'); tb.classList.remove('active'); vr.style.display='block'; vb.style.display='none'; });
}

function wireSearch(){
  document.getElementById('search').addEventListener('input', e => renderFamList(e.target.value));
}

boot();

/* Register the service worker so this page installs and works offline too.
   Only over http(s); skipped when opened directly as a file:// URL. */
if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch((err) => {
      console.warn('[aracnario] service worker registration failed:', err);
    });
  });
}
</script>
</body>
</html>
